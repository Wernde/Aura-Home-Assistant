name: Deploy Aura Preview

on:
  push:
    branches:
      - main
      - feat/light-first-command-centre
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish live preview
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare static preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp \
            index.html \
            styles.css \
            app.js \
            presence.css \
            presence.js \
            local-core.css \
            local-core.js \
            home-gateway.css \
            home-gateway.js \
            icon.svg \
            manifest.webmanifest \
            sw.js \
            _site/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
